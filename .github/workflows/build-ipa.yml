name: Build IPA (for sideloading)

on:
  push:
    branches: ["*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app
        run: |
          xcodebuild -project AutoWiFiSwitcher.xcodeproj \
            -scheme AutoWiFiSwitcher \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build/derived

      - name: Install ldid
        run: brew install ldid

      - name: Fake-sign with ldid
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          echo "App at: $APP_PATH"
          ldid -SAutoWiFiSwitcher/AutoWiFiSwitcher.entitlements "$APP_PATH/AutoWiFiSwitcher"

      - name: Package IPA
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r AutoWiFiSwitcher.ipa Payload/
          rm -rf Payload

      - name: Debug - dump Info.plist from built app
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          echo "=== Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print" "$APP_PATH/Info.plist" 2>&1
          echo "=== Bundle structure ==="
          find "$APP_PATH" -maxdepth 2 -not -path "*/_Code*" | head -40

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoWiFiSwitcher
          path: build/AutoWiFiSwitcher.ipa
