name: Build IPA (for sideloading)

on:
  push:
    branches: ["*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app
        run: |
          xcodebuild -project AutoWiFiSwitcher.xcodeproj \
            -scheme AutoWiFiSwitcher \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build/derived

      - name: Patch Info.plist with custom keys
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          PLIST="$APP_PATH/Info.plist"

          /usr/libexec/PlistBuddy -c "Set CFBundleDevelopmentRegion en" "$PLIST"

          /usr/libexec/PlistBuddy -c "Add LSRequiresIPhoneOS bool true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add UIRequiresFullScreen bool true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add NSLocationWhenInUseUsageDescription string AutoWiFi needs location access to read current WiFi network name for auto-switch functionality." "$PLIST"
          /usr/libexec/PlistBuddy -c "Add NSLocationAlwaysAndWhenInUseUsageDescription string AutoWiFi needs location access to monitor WiFi changes in background for auto-switch functionality." "$PLIST"
          /usr/libexec/PlistBuddy -c "Add UILaunchScreen dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add UIApplicationSceneManifest dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add UIApplicationSceneManifest:UIApplicationSupportsMultipleScenes bool false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add UIViewControllerBasedStatusBarAppearance bool false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add CFBundleDisplayName string AutoWiFi" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add UIBackgroundModes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add UIBackgroundModes:0 string location" "$PLIST"

          echo "=== Patched Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print" "$PLIST"

      - name: Embed entitlements with codesign
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          echo "App at: $APP_PATH"
          cat > /tmp/entitlements.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
	<key>com.apple.developer.networking.HotspotConfiguration</key>
	<true/>
	<key>com.apple.developer.networking.wifi-info</key>
	<true/>
</dict>
</plist>
EOF
          echo "=== Entitlements to embed ==="
          cat /tmp/entitlements.plist
          codesign --force --sign - --entitlements /tmp/entitlements.plist "$APP_PATH/AutoWiFiSwitcher"
          echo "=== After codesign ==="
          codesign -d --entitlements - "$APP_PATH/AutoWiFiSwitcher" 2>/dev/null | plutil -p - 2>&1 || true

      - name: Package IPA
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r AutoWiFiSwitcher.ipa Payload/
          rm -rf Payload

      - name: Verify entitlements in signed binary
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          echo "=== Entitlements extracted from binary ==="
          codesign -d --entitlements - "$APP_PATH/AutoWiFiSwitcher" 2>/dev/null | plutil -p - 2>&1 || true

      - name: Debug - dump Info.plist from built app
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          echo "=== Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print" "$APP_PATH/Info.plist" 2>&1
          echo "=== Bundle structure ==="
          find "$APP_PATH" -maxdepth 2 -not -path "*/_Code*" | head -40

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoWiFiSwitcher
          path: build/AutoWiFiSwitcher.ipa
