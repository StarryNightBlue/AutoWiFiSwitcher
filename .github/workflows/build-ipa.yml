name: Build IPA (for sideloading)

on:
  push:
    branches: ["*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build .app bundle (ad-hoc signed)
        run: |
          xcodebuild -project AutoWiFiSwitcher.xcodeproj \
            -scheme AutoWiFiSwitcher \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build/derived

      - name: Package IPA
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r AutoWiFiSwitcher.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoWiFiSwitcher
          path: build/AutoWiFiSwitcher.ipa
