name: Build IPA (for sideloading)

on:
  push:
    branches: ["*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app
        run: |
          xcodebuild -project AutoWiFiSwitcher.xcodeproj \
            -scheme AutoWiFiSwitcher \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build/derived

      - name: Create self-signed code signing certificate
        shell: bash
        run: |
          KEYCHAIN="$HOME/Library/Keychains/temp.keychain"
          KEYCHAIN_PASS="temp"

          security delete-keychain "$KEYCHAIN" 2>/dev/null || true

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 7200 "$KEYCHAIN"

          openssl genrsa -out /tmp/ca.key 2048
          openssl req -new -x509 -days 365 -key /tmp/ca.key -out /tmp/ca.crt \
            -subj "/CN=CA/O=AutoWiFi"

          openssl genrsa -out /tmp/codesign.key 2048
          openssl req -new -key /tmp/codesign.key -out /tmp/codesign.csr \
            -subj "/CN=AutoWiFiSwitcher/OU=Development/O=AutoWiFi"

          cat > /tmp/codesign_ext.cnf << 'EOF'
          [ x509_ext ]
          basicConstraints = critical, CA:FALSE
          keyUsage = critical, digitalSignature
          extendedKeyUsage = codeSigning
          subjectKeyIdentifier = hash
          authorityKeyIdentifier = keyid:always,issuer:always
          EOF

          openssl x509 -req -days 365 -in /tmp/codesign.csr \
            -CA /tmp/ca.crt -CAkey /tmp/ca.key -CAcreateserial \
            -out /tmp/codesign.crt \
            -extfile /tmp/codesign_ext.cnf -extensions x509_ext

          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain /tmp/ca.crt

          openssl pkcs12 -export -legacy -in /tmp/codesign.crt -inkey /tmp/codesign.key \
            -out /tmp/codesign.p12 -passout pass:temp

          security import /tmp/codesign.p12 -k "$KEYCHAIN" -P temp -T /usr/bin/codesign

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"

          echo "=== Identities available ==="
          security find-identity -v -p codesigning "$KEYCHAIN" 2>&1

          SHA1=$(openssl x509 -in /tmp/codesign.crt -noout -fingerprint -sha1 | cut -d= -f2 | tr -d :)
          echo "CERT_IDENTITY=$SHA1" >> $GITHUB_ENV
          echo "Using identity SHA-1: $SHA1"

      - name: Sign app with self-signed certificate
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          echo "Signing app at: $APP_PATH"
          echo "Using identity: $CERT_IDENTITY"

          codesign --force --sign "$CERT_IDENTITY" \
            --entitlements AutoWiFiSwitcher/AutoWiFiSwitcher.entitlements \
            --generate-entitlement-der \
            "$APP_PATH"

      - name: Verify signature
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          codesign -dv "$APP_PATH" 2>&1 || true
          codesign --verify --verbose "$APP_PATH" 2>&1 || true

      - name: Package IPA
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r AutoWiFiSwitcher.ipa Payload/
          rm -rf Payload

      - name: Debug - dump Info.plist from built app
        shell: bash
        run: |
          APP_PATH=$(find build/derived -name "*.app" -type d | head -1)
          echo "=== Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print" "$APP_PATH/Info.plist" 2>&1
          echo "=== Bundle structure ==="
          find "$APP_PATH" -maxdepth 2 -not -path "*/_Code*" | head -40

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoWiFiSwitcher
          path: build/AutoWiFiSwitcher.ipa
